<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dictation</title>
<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
<style>
body {
    font-family: Inter, system-ui;
    background:#f7f7f8;
    display:flex;
    justify-content:center;
    padding:30px;
}

.container {
    width:520px;
    background:white;
    padding:24px;
    border-radius:16px;
    box-shadow:0 8px 30px rgba(0,0,0,0.05);
}

h3 { text-align:center; margin-bottom:5px; }

.note {
    text-align:center;
    font-size:13px;
    color:#888;
    margin-bottom:15px;
}


select, input {
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-bottom:10px;
    box-sizing: border-box;
}

.progress {
    height:6px;
    background:#eee;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:10px;
}

.bar {
    height:100%;
    background:#111;
    width:0%;
}

#progressText {
    text-align:center;
    font-size:13px;
    margin-bottom:10px;
}

.correct {
    border-color:#2ecc71;
    background:#f6fff8;
}

.controls {
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.buttons {
    display:flex;
    gap:8px;
    margin-top:10px;
}

button {
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#f2f2f2;
    cursor:pointer;
}

button.primary {
    background:#111;
    color:white;
}

#result {
    text-align:center;
    margin-top:10px;
    font-weight:500;
}

.diff {
    text-align:center;
    margin-top:10px;
    font-size:14px;
}

#favList {
    margin-top:15px;
    max-height:150px;
    overflow-y:auto;
    border:1px solid #eee;
    border-radius:10px;
    padding:10px;
    display:none;
}

.fav-item {
    padding:6px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    font-size:14px;
}

.fav-item:hover {
    background:#f5f5f5;
}

.saved {
    background:#e8e896 !important;
}

.correct-word { color:#2ecc71; }
.wrong-word { color:red; text-decoration:line-through; }
.suggest-word { font-weight:bold; }

/* wrapper */
.ts-wrapper {
    height: 48px;
}

/* control */
.ts-control {
    height: 48px !important;
    display: flex;
    align-items: center;
    padding: 0 12px !important;
    flex-wrap: nowrap !important;   /* 🔥 QUAN TRỌNG */
}

/* input */
.ts-control input {
    height: 100% !important;
    line-height: normal !important;
    padding: 0 !important;
    margin: 0 !important;
}

/* item */
.ts-control .item {
    line-height: normal !important;
    padding: 0 !important;
    margin-right: 6px;
}

/* tránh bị xuống dòng */
.ts-control > * {
    white-space: nowrap;
}

</style>
</head>

<body>

<div class="container">

<h3>🎧 Dictation</h3>
<div class="note">Auto Next overrides Loop</div>

<select id="partSelect">
    <option value=""></option>
</select>


<div id="progressText"></div>
<div class="progress"><div id="bar" class="bar"></div></div>

<input id="jump" placeholder="Jump (e.g. 228)">
<input id="input" placeholder="Type what you hear..." autofocus>

<div id="result"></div>
<div id="diffBox" class="diff"></div>

<div class="controls">
    <label><input type="checkbox" id="autoNext" > Auto Next</label>
    <label><input type="checkbox" id="autoLoop"> Loop</label>
</div>

<div class="buttons">
    <button onclick="prev()">←</button>
    <button class="primary" onclick="play()">Play</button>
    <button onclick="next()">→</button>
</div>

<div class="buttons">
    <button onclick="checkAnswer()">Check</button>
    <button onclick="showAnswer()">Answer</button>
    <button id="saveBtn" onclick="toggleFavorite()"> Save</button>
    <button type="button" onclick="toggleList()"> List Saved</button>
</div>

<!-- 🔥 LIST -->
<div id="favList" style="display:none;"></div>

</div>

            const text = item.text.toLowerCase();
            const query = search.toLowerCase();

            // match từng ký tự (fuzzy nhẹ)
            let i = 0;
            for (let char of query) {
                i = text.indexOf(char, i);
                if (i === -1) return 0;
                i++;
            }
            return 1;
        };
        return fuzzy;
    }
});

select.onchange = () => {
    part = select.value;
    index = 0;
    load();
};

function getAnswer() {
    return data[part].files[index]
        .replace(/^\d+_?/, "")   // bỏ số + optional _
        .replace(".mp3", "")
        .replace(/\.+$/, "")     // bỏ dấu chấm cuối (..)
        .replace(/_/g, " ");
}

function normalize(t) {
    return t.toLowerCase().replace(/[^\w\s]/g,"").trim();
}

function compareText(user, correct) {
    const u = user.split(" ");
    const c = correct.split(" ");
    let out = "";

    for(let i=0;i<Math.max(u.length,c.length);i++) {
        if(u[i] === c[i]) {
            out += `<span class="correct-word">${c[i]||""}</span> `;
        } else {
            if(u[i]) out += `<span class="wrong-word">${u[i]}</span> `;
            if(c[i]) out += `<span class="suggest-word">${c[i]}</span> `;
        }
    }
    return out;
}

function load() {
    const files = data[part].files;

    if(index >= files.length) index = 0;

    progressText.innerText = `Sentence  ${index+1} / ${files.length}`;
    bar.style.width = `${(index+1)/files.length*100}%`;

    player.src = data[part].folder + "/" + files[index];

    input.value = "";
    input.classList.remove("correct");
    result.innerText = "";
    diffBox.innerHTML = "";

    updateSaveButton();
    player.play();
}

function checkAnswer() {
    const user = normalize(input.value);
    const correct = normalize(getAnswer());

    diffBox.innerHTML = compareText(user, correct);

    if(user === correct) {
        result.innerText = "Correct";
        input.classList.add("correct");
        if(autoNext.checked) setTimeout(next,500);
    } else {
        result.innerText = "Wrong";
    }
}

function prev() {
    if(index > 0) index--;
    load();
}

function next() {
    index++;
    load();
}

function play() {
    player.currentTime = 0;
    player.play();
}

function showAnswer() {
    result.innerText = getAnswer();
}

document.getElementById("jump").addEventListener("keypress", e => {
    if(e.key === "Enter") {
        const v = parseInt(e.target.value);
        if(v>0 && v<=data[part].files.length) {
            index = v-1;
            load();
        }
    }
});

player.onended = () => {
    if(autoNext.checked) return setTimeout(next,700);
    if(autoLoop.checked) player.play();
};

window.onload = load;

// =========================
// 💾 INDEXED DB
// =========================
const DB_NAME = "dictationDB";
const STORE = "favorites";
let db;

// INIT DB
function initDB() {
    return new Promise((resolve, reject) => {
        console.log("👉 Opening DB...");

        const req = indexedDB.open(DB_NAME, 1);

        req.onupgradeneeded = e => {
            console.log("⚙️ Creating store...");
            e.target.result.createObjectStore(STORE, { keyPath: "id" });
        };

        req.onsuccess = e => {
            db = e.target.result;
            console.log("✅ DB READY");
            resolve();
        };

        req.onerror = e => {
            console.error("❌ DB ERROR", e);
            reject(e);
        };
    });
}

// =========================
// 📂 GET ALL
// =========================
function getAllFavorites() {
    return new Promise(resolve => {
        const tx = db.transaction(STORE, "readonly");
        const req = tx.objectStore(STORE).getAll();

        req.onsuccess = () => {
            resolve(req.result);
        };
    });
}

// =========================
// 💾 SAVE / DELETE
// =========================
function saveFavorite() {
    const tx = db.transaction(STORE, "readwrite");

    tx.objectStore(STORE).put({
        id: part + "_" + index,
        part,
        index,
        time: Date.now()
    });

    console.log("✅ Saved:", part, index);
}

function deleteFavorite() {
    const tx = db.transaction(STORE, "readwrite");

    tx.objectStore(STORE).delete(part + "_" + index);

    console.log("❌ Removed:", part, index);
}

// =========================
// ⭐ BUTTON STATE
// =========================
async function updateSaveButton() {
    const list = await getAllFavorites();
    const id = part + "_" + index;

    const btn = document.getElementById("saveBtn");

    if (list.find(x => x.id === id)) {
        btn.innerText = "Saved";
        btn.classList.add("saved");
    } else {
        btn.innerText = "Save";
        btn.classList.remove("saved");
    }
}

// =========================
// 🔁 TOGGLE SAVE (FINAL)
// =========================
async function toggleFavorite() {
    if (!db) {
        console.error("❌ DB not ready");
        return;
    }

    const list = await getAllFavorites();
    const id = part + "_" + index;

    if (list.find(x => x.id === id)) {
        deleteFavorite();
    } else {
        saveFavorite();
    }

    // update UI
    await updateSaveButton();

    // update list nếu có
    if (typeof renderFavorites === "function") {
        renderFavorites();
    }
}

// =========================
// INIT
// =========================
window.onload = async () => {

    if (!window.indexedDB) {
        alert("❌ Browser không hỗ trợ IndexedDB");
        return;
    }

    console.log("🚀 START APP");

    await initDB();

    console.log("📂 Current data:");
    getAllFavorites().then(console.log);

    // load app của bạn
    load();
};

// =========================
// 🎯 JUMP CORE (QUAN TRỌNG)
// =========================
function jumpToFavorite(p, i) {
    part = p;
    index = i;

    // sync dropdown
    document.getElementById("partSelect").value = part;

    // gọi load → đảm bảo UI giống next/jump
    load();
}

// =========================
// 📂 LIST UI
// =========================
function toggleList() {
    const box = document.getElementById("favList");

    if (box.style.display === "none") {
        box.style.display = "block";
        renderFavorites();
    } else {
        box.style.display = "none";
    }
}

async function renderFavorites() {
    const list = await getAllFavorites();
    const box = document.getElementById("favList");

    box.innerHTML = "";

    list
        .sort((a,b)=>b.time-a.time)
        .forEach(item => {

        const div = document.createElement("div");
        div.className = "fav-item";

        div.innerText = `${item.part.toUpperCase()} - Sentence  ${item.index+1}`;

        // 🔥 CLICK → JUMP CHUẨN
        div.onclick = () => {
            jumpToFavorite(item.part, item.index);
        };

        box.appendChild(div);
    });
}

</script>
